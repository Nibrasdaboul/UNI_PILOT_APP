<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />

    <!-- Primary Meta -->
    <title>UniPilot — Your Smart Academic Companion</title>
    <meta name="description" content="UniPilot: Smart student dashboard, AI coach, planner, grades, study tools, and analytics. For students and universities. لوحة تحكم أكاديمية ذكية، أستاذ AI، مخطط، وتحليلات." />
    <meta name="keywords" content="UniPilot, student dashboard, academic planner, AI coach, grades, study tools, university, education, لوحة تحكم طالب, مخطط دراسي, ذكاء اصطناعي" />
    <meta name="author" content="UniPilot" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="UniPilot" />
    <meta property="og:title" content="UniPilot — Your Smart Academic Companion" />
    <meta property="og:description" content="Smart student dashboard, AI coach, planner, grades, and study tools. For students and universities." />
    <meta property="og:image" content="/logo-text.png" />
    <meta property="og:image:alt" content="UniPilot logo" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ar_SA" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="UniPilot — Your Smart Academic Companion" />
    <meta name="twitter:description" content="Smart student dashboard, AI coach, planner, grades, and study tools." />
    <meta name="twitter:image" content="/logo-text.png" />
    <meta name="twitter:image:alt" content="UniPilot logo" />

    <!-- Canonical (app sets dynamically from VITE_APP_URL or origin) -->
    <link rel="canonical" href="/" />

    <!-- Favicon & PWA -->
    <link rel="icon" type="image/png" href="/logo-text.png" />
    <link rel="apple-touch-icon" href="/logo-text.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- JSON-LD: WebSite + Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "name": "UniPilot",
          "description": "Your Smart Academic Companion — dashboard, AI coach, planner, grades, study tools.",
          "url": "/",
          "potentialAction": {
            "@type": "SearchAction",
            "target": { "@type": "EntryPoint", "urlTemplate": "/?q={search_term_string}" },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "name": "UniPilot",
          "description": "Smart academic companion for students and universities.",
          "url": "/"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
