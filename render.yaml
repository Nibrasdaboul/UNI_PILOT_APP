# Render Blueprint: one Web Service (API + frontend) for UniPilot
# Docs: https://render.com/docs/blueprint-spec
# Set in Dashboard: JWT_SECRET (min 32 chars), VITE_BACKEND_URL (your app URL), GROQ_API_KEY (for AI)

databases:
  - name: unipilot-db
    plan: free

services:
  - type: web
    name: unipilot
    runtime: node
    rootDir: frontend-vite
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: unipilot-db
          property: connectionString
      # Set in Dashboard: VITE_BACKEND_URL = https://unipilot.onrender.com (your URL)
      # Set in Dashboard: JWT_SECRET = strong random string (min 32 chars)
      # Set in Dashboard: GROQ_API_KEY = your_groq_api_key (optional, for AI)
