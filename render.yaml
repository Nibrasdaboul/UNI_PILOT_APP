# Render Blueprint: one Web Service (API + frontend) for UniPilot
# Use this if your GitHub repo root IS frontend-vite. Otherwise use parent folder's render.yaml with rootDir: frontend-vite.
# Docs: https://render.com/docs/blueprint-spec
# Set in Dashboard: JWT_SECRET (min 32 chars), VITE_BACKEND_URL (full app URL), GROQ_API_KEY (for AI)

databases:
  - name: unipilot-db
    plan: free

services:
  - type: web
    name: unipilot
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: unipilot-db
          property: connectionString
      # Add in Dashboard: JWT_SECRET, VITE_BACKEND_URL, GROQ_API_KEY (optional: FRONTEND_ORIGIN, UNSPLASH_ACCESS_KEY, VITE_SENTRY_DSN)
